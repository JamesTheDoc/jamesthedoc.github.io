<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Santiago Chonate | Home</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      font-family: "Courier New", monospace;
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        repeating-linear-gradient(
          to bottom,
          #7a0000 0px,
          #7a0000 2px,
          #000 2px,
          #000 12px
        );
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(
        160deg,
        transparent 0%,
        transparent 30%,
        #000 30%,
        #000 100%
      );
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 18%;
      width: 14px;
      height: 100%;
      background: #111;
      z-index: -1;
    }

    nav {
      width: 100%;
      border-top: 8px solid #111;
      background: transparent;
    }

    .nav-container {
      max-width: 1100px;
      margin: auto;
      padding: 22px 20px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 15px;
    }

    .nav-container a {
      text-decoration: none;
      color: #d9d9d9;
    }

    .nav-container a:hover {
      color: #ff2a2a;
    }

    .separator {
      color: #d9d9d9;
    }

    .hero {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .hero-box {
      max-width: 900px;
    }

    .hero h1 {
      font-size: 68px;
      margin-bottom: 20px;
      line-height: 1.1;
      color: white;
      text-shadow: 4px 4px 0 rgba(0,0,0,0.45);
      animation: flicker 2s infinite;
    }

    .hero p {
      font-size: 24px;
      color: #d0d0d0;
      margin-bottom: 16px;
    }

    .btn {
      display: inline-block;
      margin-top: 24px;
      text-decoration: none;
      padding: 13px 22px;
      border: 1px solid #d9d9d9;
      color: white;
      background: transparent;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: white;
      color: #111;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      10% { opacity: 0.85; }
      20% { opacity: 1; }
      30% { opacity: 0.35; }
      40% { opacity: 1; }
      50% { opacity: 0.75; }
      60% { opacity: 1; }
      70% { opacity: 0.25; }
      80% { opacity: 1; }
      90% { opacity: 0.9; }
    }

    @media (max-width: 768px) {
      .hero h1 {
        font-size: 42px;
      }

      .hero p {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <nav>
    <div class="nav-container">
      <a href="index.html">@ Home</a>
      <span class="separator">|</span>
      <a href="works.html">@ Works</a>
      <span class="separator">|</span>
      <a href="about.html">@ About me</a>
      <span class="separator">|</span>
      <a href="contact.html">@ Contact</a>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-box">
      <h1>Hola, Soy<br>Santiago Chonate</h1>
      <p>Bachiller en Administración de Empresas y Negocios Internacionales</p>
      <p>Computación e Informática</p>
      <a class="btn" href="contact.html">@ Contact</a>
    </div>
  </section>

</body>
</html>
